<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>alealva.com | Próximamente</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        /* --- Estilos Base --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            height: 100%;
            font-family: 'Poppins', sans-serif;
            overflow: hidden; /* Evita barras de desplazamiento */
            background-color: #0a0a0a; /* Fondo muy oscuro por defecto */
        }

        /* --- Fondo Animado --- */
        .bg-animation {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(270deg, #0f0c29, #302b63, #24243e);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            z-index: 1;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Círculos de luz decorativos (efecto fondo) */
        .light {
            position: absolute;
            border-radius: 50%;
            opacity: 0.3;
            filter: blur(60px);
            z-index: 2;
        }
        .light-1 {
            width: 300px; height: 300px;
            background: #00d2ff;
            top: -10%; left: -5%;
            animation: float1 10s infinite alternate;
        }
        .light-2 {
            width: 200px; height: 200px;
            background: #ff007f;
            bottom: 10%; right: 5%;
            animation: float2 8s infinite alternate;
        }

        @keyframes float1 {
            0% { transform: translateY(0) translateX(0); }
            100% { transform: translateY(30px) translateX(20px); }
        }
        @keyframes float2 {
            0% { transform: translateY(0) translateX(0); }
            100% { transform: translateY(-20px) translateX(-30px); }
        }


        /* --- Contenedor Principal (Glassmorphism) --- */
        .main-container {
            position: relative;
            height: 100%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10; /* Por encima del fondo */
            padding: 20px;
        }

        .glass-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px); /* Efecto vidrio */
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 20px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            max-width: 500px;
            width: 100%;
            transform: translateY(30px);
            opacity: 0;
            animation: slideUp 1s ease-out forwards;
        }

        @keyframes slideUp {
            to { transform: translateY(0); opacity: 1; }
        }

        /* --- Tipografía --- */
        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: 1px;
            background: linear-gradient(to right, #ffffff, #80d0c7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        h1 span {
            font-weight: 300;
            opacity: 0.7;
        }

        .separator {
            width: 60px;
            height: 4px;
            background: #00d2ff;
            margin: 20px auto;
            border-radius: 2px;
        }

        p {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.6;
            margin-bottom: 30px;
            font-weight: 300;
        }

        /* --- Botón/Indicador de estado --- */
        .status-tag {
            display: inline-block;
            background: rgba(0, 210, 255, 0.15);
            color: #00d2ff;
            border: 1px solid #00d2ff;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- Responsive (Celulares) --- */
        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            .glass-box { padding: 30px 20px; }
            p { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <!-- Fondo Animado y luces -->
    <div class="bg-animation"></div>
    <div class="light light-1"></div>
    <div class="light light-2"></div>

    <!-- Caja de contenido principal -->
    <div class="main-container">
        <div class="glass-box">
            <h1>alealva<span>.com</span></h1>
            <div class="separator"></div>
            <p>Estamos preparando algo increíble para ti. Muy pronto lanzaremos nuestro nuevo sitio web.</p>
            <span class="status-tag">Próximamente</span>
        </div>
    </div>

</body>
</html>
