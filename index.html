<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>alealva.com | Próximamente</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; font-family: 'Poppins', sans-serif; overflow: hidden; background-color: #0a0a0a; }

        .bg-animation {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(270deg, #0f0c29, #302b63, #24243e);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .main-container {
            position: relative; height: 100%; width: 100%; display: flex;
            justify-content: center; align-items: center; z-index: 10; padding: 20px;
        }

        .glass-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px; padding: 50px 40px; text-align: center;
            max-width: 500px; width: 100%;
        }

        h1 { font-size: 3.5rem; font-weight: 700; color: #ffffff; }
        h1 span { font-weight: 300; color: #00d2ff; }

        .separator { width: 60px; height: 4px; background: #00d2ff; margin: 20px auto; border-radius: 2px; }
        p { font-size: 1.1rem; color: rgba(255, 255, 255, 0.9); }

        /* Estilo para que la frase flote en la esquina inferior derecha */
        .footer-fixed {
            position: absolute;
            bottom: 20px;
            right: 30px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 1px;
            z-index: 20;
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    
    <div class="main-container">
        <div class="glass-box">
            <h1>alealva<span>.com</span></h1>
            <div class="separator"></div>
            <p>Estamos preparando algo increíble para ti. Muy pronto lanzaremos nuestro nuevo sitio web.</p>
        </div>
    </div>

    <!-- Frase fija en la esquina inferior derecha -->
    <div class="footer-fixed">
        Jarán es la mera 🔫
    </div>
</body>
</html>
