<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>alealva.com | Próximamente</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }
        .background {
            /* Puedes cambiar este degradado por una imagen si lo prefieres */
            background: linear-gradient(135deg, #1f1c2c 0%, #928dab 100%);
            height: 100%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        .content {
            max-width: 600px;
            animation: fadeIn 1.5s ease-in-out;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            letter-spacing: 2px;
            font-weight: 300;
        }
        h1 span {
            font-weight: 700;
            color: #00d2ff;
        }
        p {
            font-size: 1.2rem;
            opacity: 0.8;
            line-height: 1.6;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="background">
        <div class="content">
            <h1>alealva<span>.com</span></h1>
            <p>Nuestro sitio web está bajo construcción. Muy pronto estaremos en línea con grandes sorpresas.</p>
        </div>
    </div>

</body>
</html>
